<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg brand-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-semibold d-flex align-items-center" th:href="@{/products}">
            <span class="navbar-brand__mark">EM</span>
            ElectroMart
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav align-items-lg-center me-auto mb-2 mb-lg-0 gap-lg-2">
                <li class="nav-item" th:if="${currentUser == null}">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Products</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Categories
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <a class="dropdown-item" th:href="@{/products}">All Products</a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li th:each="category : ${navbarCategories}">
                            <a class="dropdown-item"
                               th:href="@{/products(category=${category.id})}"
                               th:text="${category.name}">
                                Category
                            </a>
                        </li>
                    </ul>
                </li>
                <li class="nav-item" th:if="${currentUser != null and currentUser.role == 'BUYER'}">
                    <a class="nav-link" th:href="@{/orders}">My Orders</a>
                </li>
                <li class="nav-item" th:if="${currentUser != null and currentUser.role == 'SELLER'}">
                    <a class="nav-link" th:href="@{/seller/dashboard}">Seller Dashboard</a>
                </li>
                <li class="nav-item" th:if="${currentUser != null and currentUser.role == 'ADMIN'}">
                    <a class="nav-link" th:href="@{/admin}">Admin Dashboard</a>
                </li>
                <li class="nav-item" th:if="${currentUser != null and currentUser.role == 'ADMIN'}">
                    <a class="nav-link" th:href="@{/admin/categories}">Manage Categories</a>
                </li>
            </ul>

            <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2 ms-lg-3" th:if="${currentUser == null}">
                <a class="btn btn-outline-secondary btn-sm" th:href="@{/login}">Login</a>
                <a class="btn btn-primary btn-sm" th:href="@{/register}">Register</a>
            </div>

            <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2 ms-lg-3" th:if="${currentUser != null}">
                <div class="nav-user-summary">
                    <div class="nav-user-summary__name" th:text="${currentUser.fullName}">User Name</div>
                    <div class="nav-user-summary__role" th:text="${currentUser.role}">ROLE</div>
                </div>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-secondary btn-sm" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
