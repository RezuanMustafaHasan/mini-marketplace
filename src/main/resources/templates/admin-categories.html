<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-shell">
    <div class="page-header">
        <div>
            <span class="page-header__eyebrow">Category management</span>
            <h1>Category Management</h1>
            <p>Create predefined categories that sellers can choose from.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/admin}">Back to Dashboard</a>
    </div>

    <div class="alert" th:if="${successMessage}" th:text="${successMessage}">
        Success message
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="form-panel">
                <h2 class="section-title mb-3">Create Category</h2>
                <form th:action="@{/admin/categories}" th:object="${categoryForm}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Category Name</label>
                        <input id="name" type="text" th:field="*{name}" class="form-control"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Add Category</button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="table-shell">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table app-table align-middle mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Products Using It</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="category : ${categories}">
                                <td th:text="${category.id}">1</td>
                                <td th:text="${category.name}">Phones</td>
                                <td th:text="${category.productCount}">0</td>
                                <td>
                                    <form th:action="@{/admin/categories/delete/{id}(id=${category.id})}" method="post" class="m-0">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-delete"
                                                type="submit"
                                                th:disabled="${category.productCount > 0}">
                                            Delete
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <p class="small text-muted mt-2 mb-0">Categories can only be deleted when no products are using them.</p>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
