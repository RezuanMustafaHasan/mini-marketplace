<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-shell">
    <div class="surface-card overflow-hidden">
        <div class="row g-0">
            <div class="col-md-4 bg-white d-flex align-items-center justify-content-center p-4"
                 th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}">
                <img th:src="${product.imageUrl}" alt="Product image" class="img-fluid rounded" style="max-height: 280px; object-fit: cover;">
            </div>
            <div th:class="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)} ? 'col-md-8' : 'col-12'">
                <div class="card-body p-4">
                    <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-3">
                        <div>
                            <h2 class="card-title mb-1" th:text="${product.name}">Product Name</h2>
                            <span class="category-pill" th:text="${product.categoryName}">Category</span>
                        </div>
                        <div class="text-lg-end">
                            <h4 class="text-primary mb-1" th:text="${product.price}">0.00</h4>
                            <p class="text-muted mb-0">Stock: <span th:text="${product.stock}">0</span></p>
                        </div>
                    </div>

                    <p class="card-text mb-4"
                       th:text="${product.description != null and !#strings.isEmpty(product.description) ? product.description : 'No description provided yet.'}">
                        Product description
                    </p>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="metric h-100">
                                <p class="metric__label">Seller</p>
                                <p class="metric__value" th:text="${product.sellerName}">Seller Name</p>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="metric h-100">
                                <p class="metric__label">Category</p>
                                <p class="metric__value" th:text="${product.categoryName}">Category</p>
                            </div>
                        </div>
                    </div>

                    <div class="button-row">
                        <a class="btn btn-secondary" th:href="@{/products}">Back to Products</a>
                        <a th:if="${currentUser == null}" class="btn btn-outline-primary" th:href="@{/login}">
                            Login to Order
                        </a>
                        <a th:if="${currentUser != null and (currentUser.role == 'BUYER' or currentUser.role == 'ADMIN')}"
                           class="btn btn-primary"
                           th:href="@{/checkout/{id}(id=${product.id})}">
                            Buy Now
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
