<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <div class="card shadow-sm">
        <div class="row g-0">
            <div class="col-md-4" th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}">
                <img th:src="${product.imageUrl}" alt="Product image" class="img-fluid rounded-start" style="object-fit: cover; height: 100%;">
            </div>
            <div th:class="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)} ? 'col-md-8' : 'col-12'">
                <div class="card-body">
                    <h2 class="card-title" th:text="${product.name}">Product Name</h2>
                    <p class="card-text" th:text="${product.description}">Product description</p>
                    <p class="mb-1"><strong>Price:</strong> <span th:text="${product.price}">0.00</span></p>
                    <p class="mb-1"><strong>Stock:</strong> <span th:text="${product.stock}">0</span></p>
                    <p class="mb-3"><strong>Seller:</strong> <span th:text="${product.sellerName}">Seller Name</span></p>
                    <a class="btn btn-secondary" th:href="@{/products}">Back to Products</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
