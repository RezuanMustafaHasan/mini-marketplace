<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h1 class="mb-4">Order Details</h1>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <p class="mb-1"><strong>Order ID:</strong> <span th:text="${order.id}">1</span></p>
            <p class="mb-1"><strong>Buyer:</strong> <span th:text="${order.buyerName}">Buyer Name</span></p>
            <p class="mb-1"><strong>Date:</strong> <span th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">2026-03-27 10:00</span></p>
            <p class="mb-1"><strong>Status:</strong> <span th:text="${order.status}">PENDING</span></p>
            <p class="mb-0"><strong>Total Amount:</strong> <span th:text="${order.totalAmount}">0.00</span></p>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">Order Items</h5>

            <div class="table-responsive" th:if="${!#lists.isEmpty(order.items)}">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Price At Purchase</th>
                        <th>Line Total</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${order.items}">
                        <td th:text="${item.productName}">Product Name</td>
                        <td th:text="${item.quantity}">1</td>
                        <td th:text="${item.priceAtPurchase}">0.00</td>
                        <td th:text="${item.lineTotal}">0.00</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="alert alert-info" th:if="${#lists.isEmpty(order.items)}">
                No items found for this order.
            </div>
        </div>
    </div>

    <a class="btn btn-secondary mt-3" th:href="@{/orders}">Back to Orders</a>
</div>
</body>
</html>
