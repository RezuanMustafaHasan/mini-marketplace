<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-shell">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card auth-panel">
                <div class="card-body p-4 text-center">
                    <h1 class="h3 text-danger mb-3" th:text="${errorTitle}">Something went wrong</h1>
                    <p class="mb-4 text-muted" th:text="${errorMessage}">An unexpected error occurred.</p>
                    <a class="btn btn-primary" th:href="@{/products}">Back to Products</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
