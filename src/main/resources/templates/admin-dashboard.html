<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <h1 class="mb-4">Admin Dashboard</h1>
    <p class="text-muted">Manage users, products, and orders from here.</p>

    <div class="d-grid gap-3 col-md-6">
        <a class="btn btn-outline-primary btn-lg" th:href="@{/admin/users}">Manage Users</a>
        <a class="btn btn-outline-success btn-lg" th:href="@{/admin/products}">Manage Products</a>
        <a class="btn btn-outline-warning btn-lg" th:href="@{/admin/orders}">Manage Orders</a>
    </div>

    <a class="btn btn-link mt-4 ps-0" th:href="@{/products}">Back to Products</a>
</div>
</body>
</html>
