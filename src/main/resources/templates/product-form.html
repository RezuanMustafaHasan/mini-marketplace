<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${formTitle}">Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-shell">
    <div class="page-header">
        <div>
            <span class="page-header__eyebrow">Catalog editor</span>
            <h1 th:text="${formTitle}">Product Form</h1>
            <p>Create or update your product listing with the same clean controls used across the seller workspace.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/seller/products}">Back to Products</a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="form-panel">
                <form th:action="@{${formAction}}" th:object="${product}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input id="name" type="text" th:field="*{name}" class="form-control"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="categoryId" class="form-label">Category</label>
                        <select id="categoryId" th:field="*{categoryId}" class="form-select"
                                th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid' : ''">
                            <option value="">Select a category</option>
                            <option th:each="category : ${availableCategories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}">
                                Category
                            </option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea id="description" rows="4" th:field="*{description}" class="form-control"
                                  th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"></textarea>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="price" class="form-label">Price</label>
                            <input id="price" type="number" step="0.01" min="0.01" th:field="*{price}" class="form-control"
                                   th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="stock" class="form-label">Stock</label>
                            <input id="stock" type="number" min="0" th:field="*{stock}" class="form-control"
                                   th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="imageUrl" class="form-label">Image URL</label>
                        <input id="imageUrl" type="text" th:field="*{imageUrl}" class="form-control"
                               th:classappend="${#fields.hasErrors('imageUrl')} ? 'is-invalid' : ''">
                        <div class="form-text">Optional image link for product preview.</div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}"></div>
                    </div>

                    <div class="button-row">
                        <button class="btn btn-primary" type="submit">Save Product</button>
                        <a class="btn btn-secondary" th:href="@{/seller/products}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
