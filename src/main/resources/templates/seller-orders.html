<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seller Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h1 class="mb-1">Seller Orders</h1>
            <p class="text-muted mb-0">Only orders that contain your own products are listed here.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/seller/dashboard}">Back to Dashboard</a>
    </div>

    <div class="card shadow-sm border-0" th:if="${!#lists.isEmpty(orders)}">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Order ID</th>
                        <th>Buyer</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Total Amount</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.id}">1</td>
                        <td th:text="${order.buyerName}">Buyer Name</td>
                        <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">2026-03-27 10:00</td>
                        <td th:text="${order.status.displayName}">PENDING</td>
                        <td th:text="${order.totalAmount}">0.00</td>
                        <td>
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/seller/orders/{id}(id=${order.id})}">Details</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="alert alert-info shadow-sm border-0" th:if="${#lists.isEmpty(orders)}">
        No seller-related orders found yet.
    </div>
</div>
</body>
</html>
