<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>All Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">All Products</h1>
        <a class="btn btn-outline-primary" th:href="@{/seller/products}">Seller Dashboard</a>
    </div>

    <form class="row g-2 mb-4" method="get" th:action="@{/products}">
        <div class="col-md-10">
            <input class="form-control" type="text" name="keyword" th:value="${keyword}"
                   placeholder="Search products by name">
        </div>
        <div class="col-md-2 d-grid">
            <button class="btn btn-primary" type="submit">Search</button>
        </div>
    </form>

    <div class="row g-3" th:if="${!#lists.isEmpty(products)}">
        <div class="col-md-6 col-lg-4" th:each="product : ${products}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Product Name</h5>
                    <p class="card-text text-muted" th:text="${product.description}">Description</p>
                    <p class="mb-1"><strong>Price:</strong> <span th:text="${product.price}">0.00</span></p>
                    <p class="mb-0"><strong>Stock:</strong> <span th:text="${product.stock}">0</span></p>
                </div>
                <div class="card-footer bg-white border-0 pt-0 pb-3 px-3">
                    <a class="btn btn-sm btn-outline-primary w-100" th:href="@{/products/{id}(id=${product.id})}">View Details</a>
                </div>
            </div>
        </div>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(products)}">
        No products found.
    </div>
</div>
</body>
</html>
