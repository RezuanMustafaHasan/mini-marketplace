<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">My Orders</h1>
        <a class="btn btn-outline-primary" th:href="@{/products}">Continue Shopping</a>
    </div>

    <div class="table-responsive" th:if="${!#lists.isEmpty(orders)}">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>Order ID</th>
                <th>Date</th>
                <th>Status</th>
                <th>Total Amount</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}">1</td>
                <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">2026-03-27 10:00</td>
                <td th:text="${order.status}">PENDING</td>
                <td th:text="${order.totalAmount}">0.00</td>
                <td>
                    <a class="btn btn-sm btn-outline-secondary" th:href="@{/orders/{id}(id=${order.id})}">View Details</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(orders)}">
        You have no orders yet.
    </div>
</div>
</body>
</html>
