<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h1 class="mb-1">My Products</h1>
            <p class="text-muted mb-0">Manage the products you listed in the marketplace.</p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/seller/dashboard}">Seller Dashboard</a>
            <a class="btn btn-primary" th:href="@{/seller/products/new}">Add Product</a>
        </div>
    </div>

    <div class="card shadow-sm border-0" th:if="${!#lists.isEmpty(products)}">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="product : ${products}">
                        <td>
                            <div class="fw-semibold" th:text="${product.name}">Product Name</div>
                            <div class="small text-muted" th:text="${product.sellerName}">Seller</div>
                        </td>
                        <td th:text="${product.categoryName}">Category</td>
                        <td th:text="${product.price}">0.00</td>
                        <td th:text="${product.stock}">0</td>
                        <td>
                            <div class="d-flex gap-2 flex-wrap">
                                <a class="btn btn-sm btn-outline-primary" th:href="@{/products/{id}(id=${product.id})}">View</a>
                                <a class="btn btn-sm btn-outline-secondary" th:href="@{/seller/products/edit/{id}(id=${product.id})}">Edit</a>
                                <form th:action="@{/seller/products/delete/{id}(id=${product.id})}" method="post"
                                      onsubmit="return confirm('Are you sure you want to delete this product?');"
                                      class="m-0">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="alert alert-info shadow-sm border-0" th:if="${#lists.isEmpty(products)}">
        You have not added any products yet. Start by creating your first electronic product listing.
    </div>
</div>
</body>
</html>
