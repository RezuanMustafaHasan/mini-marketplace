<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">My Products</h1>
        <a class="btn btn-primary" th:href="@{/seller/products/new}">Add Product</a>
    </div>

    <div class="table-responsive" th:if="${!#lists.isEmpty(products)}">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.name}">Product Name</td>
                <td th:text="${product.price}">0.00</td>
                <td th:text="${product.stock}">0</td>
                <td>
                    <div class="d-flex gap-2 flex-wrap">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/products/{id}(id=${product.id})}">View</a>
                        <a class="btn btn-sm btn-outline-secondary" th:href="@{/seller/products/edit/{id}(id=${product.id})}">Edit</a>
                        <form th:action="@{/seller/products/delete/{id}(id=${product.id})}" method="post"
                              onsubmit="return confirm('Are you sure you want to delete this product?');" class="m-0">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(products)}">
        You have not added any products yet.
    </div>

    <a class="btn btn-link mt-2 ps-0" th:href="@{/products}">Back to all products</a>
</div>
</body>
</html>
