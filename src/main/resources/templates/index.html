<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ElectroMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-shell">
    <section class="surface-card hero-panel">
        <div class="page-header mb-0">
            <div>
                <span class="page-header__eyebrow">ElectroMart</span>
                <h1>Modern electronics shopping for everyday buyers and sellers.</h1>
                <p>Browse curated tech products, manage your store, and keep orders moving from one clean marketplace experience.</p>
            </div>
            <div class="button-row">
                <a class="btn btn-primary" th:href="@{/products}">Browse Products</a>
                <a class="btn btn-outline-secondary" th:href="@{/login}">Login</a>
            </div>
        </div>
    </section>
</div>
</body>
</html>
