<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ElectroMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-shell">
    <section class="hero-carousel-shell" th:if="${!#lists.isEmpty(homeSlides)}">
        <div id="homeHeroCarousel"
             class="carousel slide hero-carousel"
             aria-roledescription="carousel">
            <div class="carousel-indicators hero-carousel__indicators">
                <button th:each="slide, stat : ${homeSlides}"
                        type="button"
                        th:attr="data-slide-index=${stat.index}, aria-label=${'Slide ' + (stat.index + 1)}, aria-current=${stat.first ? 'true' : 'false'}"
                        th:classappend="${stat.first} ? ' active' : ''"></button>
            </div>

            <div class="carousel-inner hero-carousel__inner">
                <div th:each="slide, stat : ${homeSlides}"
                     class="carousel-item hero-carousel__item"
                     th:classappend="${stat.first} ? ' active' : ''">
                    <img th:src="${slide.imageUrl}" th:alt="${slide.altText}" class="hero-carousel__image">
                </div>
            </div>

            <button class="carousel-control-prev hero-carousel__control" type="button" aria-label="Previous slide">
                <span class="hero-carousel__control-btn" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                        <path d="M14.5 6.5 9 12l5.5 5.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next hero-carousel__control" type="button" aria-label="Next slide">
                <span class="hero-carousel__control-btn" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                        <path d="M9.5 6.5 15 12l-5.5 5.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </section>

    <th:block th:replace="~{fragments/product-catalog :: catalog}"></th:block>
</div>
<script th:if="${!#lists.isEmpty(homeSlides)}">
    document.addEventListener("DOMContentLoaded", function () {
        const carouselElement = document.getElementById("homeHeroCarousel");
        if (!carouselElement) {
            return;
        }

        const slides = Array.from(carouselElement.querySelectorAll(".carousel-item"));
        const indicators = Array.from(carouselElement.querySelectorAll(".carousel-indicators button"));
        const previousButton = carouselElement.querySelector(".carousel-control-prev");
        const nextButton = carouselElement.querySelector(".carousel-control-next");
        const intervalMs = 4500;

        if (slides.length <= 1) {
            return;
        }

        let activeIndex = slides.findIndex((slide) => slide.classList.contains("active"));
        let intervalId = null;

        if (activeIndex < 0) {
            activeIndex = 0;
        }

        const render = (nextIndex) => {
            activeIndex = nextIndex;
            slides.forEach((slide, index) => {
                slide.classList.toggle("active", index === activeIndex);
            });
            indicators.forEach((indicator, index) => {
                const isActive = index === activeIndex;
                indicator.classList.toggle("active", isActive);
                indicator.setAttribute("aria-current", isActive ? "true" : "false");
            });
        };

        const goTo = (nextIndex) => {
            const normalizedIndex = (nextIndex + slides.length) % slides.length;
            render(normalizedIndex);
        };

        const goNext = () => goTo(activeIndex + 1);
        const goPrevious = () => goTo(activeIndex - 1);

        const startAutoRotate = () => {
            window.clearInterval(intervalId);
            intervalId = window.setInterval(goNext, intervalMs);
        };

        const stopAutoRotate = () => {
            window.clearInterval(intervalId);
            intervalId = null;
        };

        previousButton?.addEventListener("click", function () {
            goPrevious();
            startAutoRotate();
        });

        nextButton?.addEventListener("click", function () {
            goNext();
            startAutoRotate();
        });

        indicators.forEach((indicator, index) => {
            indicator.addEventListener("click", function () {
                goTo(index);
                startAutoRotate();
            });
        });

        carouselElement.addEventListener("mouseenter", stopAutoRotate);
        carouselElement.addEventListener("mouseleave", startAutoRotate);

        render(activeIndex);
        startAutoRotate();
    });
</script>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
