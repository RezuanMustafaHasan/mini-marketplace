<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-shell">
    <div class="page-header">
        <div>
            <span class="page-header__eyebrow">Admin users</span>
            <h1>All Users</h1>
            <p>Review registered marketplace accounts and access roles.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/admin}">Back to Dashboard</a>
    </div>

    <div class="table-shell">
        <div class="table-shell__header">
            <div>
                <h2 class="section-title mb-0">User directory</h2>
                <p>Registered accounts and their current access roles.</p>
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table app-table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Enabled</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">1</td>
                        <td th:text="${user.fullName}">User Name</td>
                        <td th:text="${user.email}">user@email.com</td>
                        <td><span class="category-pill" th:text="${user.role}">BUYER</span></td>
                        <td><span class="table-meta" th:text="${user.enabled ? 'Enabled' : 'Disabled'}">Enabled</span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
