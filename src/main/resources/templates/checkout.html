<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-shell">
    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card h-100">
                <div class="card-body">
                    <h1 class="h3 mb-3">Checkout</h1>
                    <p class="text-muted">Review the product information before placing your order.</p>
                    <hr>
                    <h5 th:text="${product.name}">Product Name</h5>
                    <span class="category-pill mb-3" th:text="${product.categoryName}">Category</span>
                    <p class="text-muted mb-3"
                       th:text="${product.description != null and !#strings.isEmpty(product.description) ? product.description : 'No description provided yet.'}">
                        Product Description
                    </p>
                    <p class="mb-1"><strong>Price:</strong> <span th:text="${product.price}">0.00</span></p>
                    <p class="mb-1"><strong>Stock:</strong> <span th:text="${product.stock}">0</span></p>
                    <p class="mb-0"><strong>Seller:</strong> <span th:text="${product.sellerName}">Seller</span></p>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <form th:action="@{/orders}" method="post" class="card">
                <div class="card-body">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <h2 class="h4 mb-3">Order Form</h2>

                    <div class="mb-4">
                        <label for="quantity" class="form-label">Quantity</label>
                        <input id="quantity" class="form-control" type="number" name="quantity" min="1"
                               th:attr="max=${product.stock}" th:value="${quantity}" required>
                    </div>

                    <div class="button-row">
                        <button class="btn btn-primary" type="submit">Place Order</button>
                        <a class="btn btn-secondary" th:href="@{/products/{id}(id=${product.id})}">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
