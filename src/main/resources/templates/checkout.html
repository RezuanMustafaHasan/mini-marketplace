<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h1 class="mb-4">Checkout</h1>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title" th:text="${product.name}">Product Name</h5>
            <p class="text-muted mb-2" th:text="${product.description}">Product Description</p>
            <p class="mb-1"><strong>Price:</strong> <span th:text="${product.price}">0.00</span></p>
            <p class="mb-0"><strong>Stock:</strong> <span th:text="${product.stock}">0</span></p>
        </div>
    </div>

    <form th:action="@{/orders}" method="post" class="card shadow-sm">
        <div class="card-body">
            <input type="hidden" name="productId" th:value="${product.id}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-3">
                <label for="quantity" class="form-label">Quantity</label>
                <input id="quantity" class="form-control" type="number" name="quantity" min="1" th:value="${quantity}" required>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-primary" type="submit">Place Order</button>
                <a class="btn btn-secondary" th:href="@{/products}">Cancel</a>
            </div>
        </div>
    </form>
</div>
</body>
</html>
