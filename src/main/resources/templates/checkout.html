<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-shell">
    <div class="page-header">
        <div>
            <span class="page-header__eyebrow">Checkout</span>
            <h1>Confirm your order</h1>
            <p>Review the selected product, choose quantity, and place your order with the same clean experience as the storefront.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/products/{id}(id=${product.id})}">Back to Product</a>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="info-panel h-100">
                <h2 class="section-title mb-3">Order summary</h2>
                <div class="stack-sm">
                    <span class="category-pill" th:text="${product.categoryName}">Category</span>
                    <h3 class="mb-0" th:text="${product.name}">Product Name</h3>
                    <p class="product-summary__price mb-0" th:text="${product.price}">0.00</p>
                    <p class="text-muted mb-2"
                       th:text="${product.description != null and !#strings.isEmpty(product.description) ? product.description : 'No description provided yet.'}">
                        Product Description
                    </p>
                </div>

                <div class="product-summary__meta mt-4">
                    <div class="product-summary__meta-item">
                        <p class="product-summary__meta-label">Stock</p>
                        <p class="product-summary__meta-value"><span th:text="${product.stock}">0</span> units available</p>
                    </div>
                    <div class="product-summary__meta-item">
                        <p class="product-summary__meta-label">Seller</p>
                        <p class="product-summary__meta-value" th:text="${product.sellerName}">Seller</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="form-panel h-100">
                <form th:action="@{/orders}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <h2 class="section-title mb-3">Order form</h2>

                    <div class="mb-4">
                        <label for="quantity" class="form-label">Quantity</label>
                        <input id="quantity" class="form-control" type="number" name="quantity" min="1"
                               th:attr="max=${product.stock}" th:value="${quantity}" required>
                    </div>

                    <div class="button-row">
                        <button class="btn btn-primary" type="submit">Place Order</button>
                        <a class="btn btn-secondary" th:href="@{/products/{id}(id=${product.id})}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
