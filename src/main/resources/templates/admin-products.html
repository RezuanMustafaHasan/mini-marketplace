<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-shell">
    <div class="page-header">
        <div>
            <span class="page-header__eyebrow">Admin inventory</span>
            <h1>All Products</h1>
            <p>Review every product across the marketplace.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/admin}">Back to Dashboard</a>
    </div>

    <div class="table-shell">
        <div class="table-shell__header">
            <div>
                <h2 class="section-title mb-0">Marketplace inventory</h2>
                <p>All products currently available across every seller account.</p>
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table app-table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Seller</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}">1</td>
                        <td th:text="${product.name}">Product Name</td>
                        <td><span class="category-pill" th:text="${product.categoryName}">Category</span></td>
                        <td th:text="${product.price}">0.00</td>
                        <td th:text="${product.stock}">0</td>
                        <td th:text="${product.sellerName}">Seller Name</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
