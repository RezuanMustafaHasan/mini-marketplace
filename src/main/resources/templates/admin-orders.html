<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h1 class="mb-4">All Orders</h1>

    <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Buyer</th>
                <th>Order Date</th>
                <th>Status</th>
                <th>Total Amount</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}">1</td>
                <td th:text="${order.buyerName}">Buyer Name</td>
                <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">2026-03-27 10:00</td>
                <td th:text="${order.status}">PENDING</td>
                <td th:text="${order.totalAmount}">0.00</td>
            </tr>
            </tbody>
        </table>
    </div>

    <a class="btn btn-secondary" th:href="@{/admin}">Back to Dashboard</a>
</div>
</body>
</html>
