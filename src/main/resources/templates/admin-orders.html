<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-shell">
    <div class="page-header">
        <div>
            <span class="page-header__eyebrow">Admin orders</span>
            <h1>All Orders</h1>
            <p>Review marketplace orders and inspect delivery progress.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/admin}">Back to Dashboard</a>
    </div>

    <div class="table-shell">
        <div class="table-shell__header">
            <div>
                <h2 class="section-title mb-0">Marketplace orders</h2>
                <p>Complete order activity across the full platform.</p>
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table app-table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Buyer</th>
                        <th>Order Date</th>
                        <th>Status</th>
                        <th>Total Amount</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.id}">1</td>
                        <td th:text="${order.buyerName}">Buyer Name</td>
                        <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">2026-03-27 10:00</td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="${order.status.name() == 'PENDING'} ? ' status-pending' :
                                                  (${order.status.name() == 'CONFIRMED'} ? ' status-confirmed' :
                                                  (${order.status.name() == 'OUT_FOR_DELIVERY'} ? ' status-out-for-delivery' :
                                                  (${order.status.name() == 'DELIVERED'} ? ' status-delivered' : ' status-cancelled')))"
                                  th:text="${order.status.displayName}">
                                PENDING
                            </span>
                        </td>
                        <td th:text="${order.totalAmount}">0.00</td>
                        <td>
                            <a class="btn btn-sm btn-primary" th:href="@{/orders/{id}(id=${order.id})}">View</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
