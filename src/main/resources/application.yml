spring:
  application:
    name: marketplace

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/marketplace_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:12345678}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL:update}
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  admin:
    email: ${ADMIN_EMAIL:admin@marketplace.com}
    password: ${ADMIN_PASSWORD:admin123}

logging:
  level:
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}
