spring.datasource.url=jdbc:h2:mem:marketplace_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

app.admin.email=${TEST_ADMIN_EMAIL:admin-test@marketplace.local}
app.admin.password=${TEST_ADMIN_PASSWORD:test-only-change-me}

logging.level.org.springframework.security=WARN
